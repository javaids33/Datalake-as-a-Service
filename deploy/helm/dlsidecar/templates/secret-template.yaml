{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app: dlsidecar
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  DLS_{{ $key | upper }}: {{ $value | quote }}
  {{- end }}
{{- end }}
