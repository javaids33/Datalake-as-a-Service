<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      @keyframes flowR { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
      @keyframes flowL { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 20; } }
      .fr { stroke-dasharray: 8 4; animation: flowR 0.6s linear infinite; }
      .fl { stroke-dasharray: 8 4; animation: flowL 0.6s linear infinite; }
    </style>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16a34a"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ca8a04"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#dc2626"/></marker>
  </defs>

  <rect width="1200" height="900" fill="#fafbfc" rx="10"/>
  <text x="600" y="35" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">User Workflows — How Data Flows Through dlsidecar</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- WORKFLOW 1: Developer reads local CSV -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="60" width="1160" height="130" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="40" y="82" font-size="13" font-weight="700" fill="#15803d">Workflow 1: Developer reads a local CSV file</text>
  <text x="40" y="98" font-size="11" fill="#16a34a">DuckDB handles this entirely in-pod. Zero network hops. Sub-millisecond.</text>

  <rect x="50" y="115" width="120" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="110" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">App</text>
  <text x="110" y="153" text-anchor="middle" font-size="9" fill="#94a3b8">POST /query</text>

  <path d="M170,140 L250,140" fill="none" stroke="#16a34a" stroke-width="2" class="fr" marker-end="url(#ag)"/>

  <rect x="250" y="115" width="140" height="50" rx="6" fill="#ede9fe" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="320" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Query Router</text>
  <text x="320" y="153" text-anchor="middle" font-size="9" fill="#7c3aed">local file detected</text>

  <path d="M390,140 L470,140" fill="none" stroke="#16a34a" stroke-width="2.5" class="fr" marker-end="url(#ag)"/>
  <text x="430" y="132" font-size="9" font-weight="600" fill="#16a34a">PATH A</text>

  <rect x="470" y="115" width="140" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="540" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">DuckDB</text>
  <text x="540" y="153" text-anchor="middle" font-size="9" fill="#16a34a">read_csv('/data.csv')</text>

  <path d="M610,140 L690,140" fill="none" stroke="#16a34a" stroke-width="2" class="fr" marker-end="url(#ag)"/>

  <rect x="690" y="115" width="130" height="50" rx="6" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
  <text x="755" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">/data/input.csv</text>
  <text x="755" y="153" text-anchor="middle" font-size="9" fill="#16a34a">local filesystem</text>

  <path d="M690,150 L610,150" fill="none" stroke="#16a34a" stroke-width="1.5" class="fl" marker-end="url(#ag)"/>

  <rect x="880" y="115" width="280" height="50" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="1020" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Result: JSON/Arrow via localhost</text>
  <text x="1020" y="153" text-anchor="middle" font-size="10" fill="#92400e">Starburst never touched. Zero network cost.</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- WORKFLOW 2: Data producer pushes to Iceberg -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="205" width="1160" height="130" rx="10" fill="#fef9c3" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="40" y="227" font-size="13" font-weight="700" fill="#854d0e">Workflow 2: App produces data, pushes to Iceberg, federates to the firm</text>
  <text x="40" y="243" font-size="11" fill="#92400e">App writes JSON/Arrow data. DuckDB converts and writes Iceberg. HMS registers. Starburst sees it instantly.</text>

  <rect x="50" y="260" width="100" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="100" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">App</text>
  <text x="100" y="298" text-anchor="middle" font-size="9" fill="#94a3b8">POST /push</text>

  <path d="M150,285 L210,285" fill="none" stroke="#ca8a04" stroke-width="2" class="fr" marker-end="url(#ay)"/>

  <rect x="210" y="260" width="120" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="270" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">DuckDB</text>
  <text x="270" y="298" text-anchor="middle" font-size="9" fill="#16a34a">validate + convert</text>

  <path d="M330,285 L400,285" fill="none" stroke="#ca8a04" stroke-width="2" class="fr" marker-end="url(#ay)"/>

  <rect x="400" y="260" width="140" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="470" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Iceberg Mgr</text>
  <text x="470" y="298" text-anchor="middle" font-size="9" fill="#92400e">pyiceberg write</text>

  <path d="M540,275 L620,275" fill="none" stroke="#16a34a" stroke-width="2" class="fr" marker-end="url(#ag)"/>

  <rect x="620" y="260" width="120" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" filter="url(#sh)"/>
  <text x="680" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">S3 Bucket</text>
  <text x="680" y="298" text-anchor="middle" font-size="9" fill="#16a34a">Iceberg files</text>

  <path d="M540,295 L620,300" fill="none" stroke="#ca8a04" stroke-width="1.5" class="fr" marker-end="url(#ay)"/>

  <rect x="780" y="260" width="110" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#sh)"/>
  <text x="835" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">HMS</text>
  <text x="835" y="298" text-anchor="middle" font-size="9" fill="#3b82f6">register table</text>
  <path d="M740,285 L780,285" fill="none" stroke="#ca8a04" stroke-width="1.5" class="fr" marker-end="url(#ay)"/>

  <path d="M890,285 L940,285" fill="none" stroke="#2563eb" stroke-width="2" class="fr" marker-end="url(#ab)"/>

  <rect x="940" y="260" width="220" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
  <text x="1050" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Starburst sees it instantly</text>
  <text x="1050" y="298" text-anchor="middle" font-size="10" fill="#3b82f6">All teams can query via federation</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- WORKFLOW 3: Heavy analytics offloaded to Trino -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="350" width="1160" height="155" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="40" y="372" font-size="13" font-weight="700" fill="#1e40af">Workflow 3: Heavy analytics query offloaded to Starburst/Trino</text>
  <text x="40" y="388" font-size="11" fill="#3b82f6">GROUP BY on 500GB table. DuckDB is too lightweight for this. Router offloads to Trino's distributed workers.</text>

  <rect x="50" y="405" width="100" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="100" y="427" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Analyst</text>
  <text x="100" y="443" text-anchor="middle" font-size="9" fill="#94a3b8">GROUP BY</text>

  <path d="M150,430 L210,430" fill="none" stroke="#64748b" stroke-width="1.5" class="fr"/>

  <rect x="210" y="405" width="140" height="50" rx="6" fill="#ede9fe" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="280" y="427" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Query Router</text>
  <text x="280" y="443" text-anchor="middle" font-size="9" fill="#7c3aed">heavy compute detected</text>

  <path d="M350,420 L430,420" fill="none" stroke="#2563eb" stroke-width="3" class="fr" marker-end="url(#ab)"/>
  <text x="390" y="413" font-size="10" font-weight="700" fill="#1e40af">OFFLOAD</text>

  <rect x="430" y="405" width="120" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
  <text x="490" y="427" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Starburst</text>
  <text x="490" y="443" text-anchor="middle" font-size="9" fill="#3b82f6">client</text>

  <path d="M550,420 L640,420" fill="none" stroke="#2563eb" stroke-width="3.5" class="fr" marker-end="url(#ab)"/>
  <text x="595" y="413" font-size="9" font-weight="600" fill="#1e40af">JWT/TLS</text>

  <rect x="640" y="395" width="260" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
  <text x="770" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Trino Distributed Workers</text>
  <text x="770" y="438" text-anchor="middle" font-size="10" fill="#3b82f6">Scan 500GB across 10 workers in parallel</text>
  <text x="770" y="453" text-anchor="middle" font-size="10" fill="#3b82f6">Aggregate, join, compute at cluster scale</text>

  <path d="M640,445 L550,445" fill="none" stroke="#2563eb" stroke-width="2.5" class="fl" marker-end="url(#ab)"/>
  <text x="595" y="460" font-size="9" font-weight="600" fill="#1e40af">results</text>

  <path d="M430,445 L350,445" fill="none" stroke="#7c3aed" stroke-width="2" class="fl" marker-end="url(#ap)"/>
  <text x="390" y="460" font-size="9" fill="#7c3aed">relay back</text>

  <rect x="940" y="405" width="220" height="50" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="1050" y="427" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">DuckDB caches result locally</text>
  <text x="1050" y="443" text-anchor="middle" font-size="10" fill="#92400e">Next identical query: instant from cache</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- WORKFLOW 4: Cross-team federated join -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="520" width="1160" height="155" rx="10" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5"/>
  <text x="40" y="542" font-size="13" font-weight="700" fill="#9d174d">Workflow 4: Cross-team federated JOIN (payments + finance)</text>
  <text x="40" y="558" font-size="11" fill="#be185d">payments.transactions (owned) JOIN finance.accounts (unowned). Hybrid: Starburst resolves finance, DuckDB joins locally.</text>

  <rect x="50" y="575" width="130" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="115" y="597" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Data Scientist</text>
  <text x="115" y="613" text-anchor="middle" font-size="9" fill="#94a3b8">SQL: JOIN ...</text>

  <path d="M180,600 L230,600" fill="none" stroke="#64748b" stroke-width="1.5" class="fr"/>

  <rect x="230" y="575" width="130" height="50" rx="6" fill="#ede9fe" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="295" y="597" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Router</text>
  <text x="295" y="613" text-anchor="middle" font-size="9" fill="#7c3aed">HYBRID detected</text>

  <!-- Owned side → DuckDB -->
  <path d="M360,585 L430,575" fill="none" stroke="#16a34a" stroke-width="2" class="fr" marker-end="url(#ag)"/>
  <rect x="430" y="565" width="150" height="35" rx="6" fill="#dcfce7" stroke="#16a34a" filter="url(#sh)"/>
  <text x="505" y="587" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">DuckDB: payments.*</text>

  <!-- Unowned side → Starburst -->
  <path d="M360,615 L430,620" fill="none" stroke="#2563eb" stroke-width="2" class="fr" marker-end="url(#ab)"/>
  <rect x="430" y="610" width="150" height="35" rx="6" fill="#dbeafe" stroke="#2563eb" filter="url(#sh)"/>
  <text x="505" y="632" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Starburst: finance.*</text>

  <!-- Starburst resolves -->
  <path d="M580,627 L660,627" fill="none" stroke="#2563eb" stroke-width="2.5" class="fr" marker-end="url(#ab)"/>
  <rect x="660" y="610" width="170" height="35" rx="6" fill="#fee2e2" stroke="#dc2626" filter="url(#sh)"/>
  <text x="745" y="632" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">finance.accounts (governed)</text>

  <!-- Results merge in DuckDB -->
  <path d="M580,582 L870,592" fill="none" stroke="#16a34a" stroke-width="1.5" class="fr"/>
  <path d="M660,625 L870,605" fill="none" stroke="#2563eb" stroke-width="1.5" class="fl" marker-end="url(#ab)"/>

  <rect x="870" y="580" width="140" height="50" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" filter="url(#sh)"/>
  <text x="940" y="602" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">DuckDB JOIN</text>
  <text x="940" y="618" text-anchor="middle" font-size="9" fill="#7c3aed">local + remote merged</text>

  <rect x="1040" y="580" width="120" height="50" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="1100" y="602" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Result</text>
  <text x="1100" y="618" text-anchor="middle" font-size="9" fill="#92400e">audit logged</text>
  <path d="M1010,605 L1040,605" fill="none" stroke="#ca8a04" stroke-width="1.5" class="fr" marker-end="url(#ay)"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- WORKFLOW 5: Streaming ingest from Kafka -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="690" width="1160" height="120" rx="10" fill="#fef9c3" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="40" y="712" font-size="13" font-weight="700" fill="#854d0e">Workflow 5: Streaming ingest from Kafka to Iceberg</text>
  <text x="40" y="728" font-size="11" fill="#92400e">Kafka events buffered in DuckDB temp table, auto-flushed to Iceberg, registered in HMS, visible in Starburst.</text>

  <rect x="50" y="745" width="100" height="40" rx="6" fill="#fef9c3" stroke="#fcd34d" filter="url(#sh)"/>
  <text x="100" y="770" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Kafka</text>

  <path d="M150,765 L230,765" fill="none" stroke="#ca8a04" stroke-width="2" class="fr" marker-end="url(#ay)"/>

  <rect x="230" y="745" width="130" height="40" rx="6" fill="#fce7f3" stroke="#ec4899" filter="url(#sh)"/>
  <text x="295" y="770" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">Kafka Bridge</text>

  <path d="M360,765 L430,765" fill="none" stroke="#16a34a" stroke-width="2" class="fr" marker-end="url(#ag)"/>

  <rect x="430" y="745" width="130" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" filter="url(#sh)"/>
  <text x="495" y="770" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">DuckDB buffer</text>

  <path d="M560,765 L630,765" fill="none" stroke="#ca8a04" stroke-width="2" class="fr" marker-end="url(#ay)"/>
  <text x="595" y="757" font-size="9" fill="#854d0e">auto-flush</text>

  <rect x="630" y="745" width="140" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" filter="url(#sh)"/>
  <text x="700" y="770" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Iceberg write</text>

  <path d="M770,765 L830,765" fill="none" stroke="#16a34a" stroke-width="2" class="fr" marker-end="url(#ag)"/>

  <rect x="830" y="745" width="100" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" filter="url(#sh)"/>
  <text x="880" y="770" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">S3</text>

  <path d="M930,765 L990,765" fill="none" stroke="#ca8a04" stroke-width="1.5" class="fr" marker-end="url(#ay)"/>

  <rect x="990" y="745" width="170" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" filter="url(#sh)"/>
  <text x="1075" y="762" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">HMS register</text>
  <text x="1075" y="778" text-anchor="middle" font-size="10" fill="#3b82f6">Starburst visible</text>

  <!-- Bottom legend -->
  <rect x="20" y="825" width="1160" height="55" rx="8" fill="#f1f5f9"/>
  <text x="40" y="848" font-size="12" font-weight="700" fill="#334155">Why Trino for heavy compute?</text>
  <text x="40" y="868" font-size="11" fill="#64748b">Trino distributes work across multiple workers in parallel. A 500GB GROUP BY that would OOMKill DuckDB (4GB memory) completes in seconds on a 10-worker Trino cluster.</text>
</svg>
