<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      @keyframes flowR { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
      @keyframes flowL { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 24; } }
      .fr { stroke-dasharray: 8 4; animation: flowR 0.7s linear infinite; }
      .fl { stroke-dasharray: 8 4; animation: flowL 0.7s linear infinite; }
    </style>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16a34a"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="agr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
  </defs>

  <rect width="1200" height="780" fill="#fafbfc" rx="12"/>
  <text x="600" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">dlsidecar Architecture</text>
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#64748b">Own catalog queries go direct to S3. Everything else federates through Starburst.</text>

  <!-- ═══ EKS Pod ═══ -->
  <rect x="25" y="75" width="530" height="600" rx="12" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="45" y="97" font-size="13" font-weight="600" fill="#64748b">EKS Pod (team)</text>

  <!-- App container (local files live HERE) -->
  <rect x="55" y="112" width="240" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="175" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">App Container</text>
  <text x="175" y="153" text-anchor="middle" font-size="11" fill="#94a3b8">POST localhost:8765/query</text>
  <!-- Local files badge inside app container -->
  <rect x="70" y="165" width="100" height="25" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="120" y="182" text-anchor="middle" font-size="9" font-weight="600" fill="#15803d">Local files</text>
  <rect x="180" y="165" width="100" height="25" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="230" y="182" text-anchor="middle" font-size="9" font-weight="600" fill="#15803d">CSV, Parquet</text>

  <!-- dlsidecar boundary -->
  <rect x="40" y="220" width="505" height="430" rx="10" fill="#f0f9ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="60" y="242" font-size="12" font-weight="600" fill="#3b82f6">dlsidecar container</text>

  <!-- Query Router -->
  <rect x="80" y="260" width="220" height="60" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" filter="url(#sh)"/>
  <text x="190" y="285" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Query Router</text>
  <text x="190" y="303" text-anchor="middle" font-size="11" fill="#7c3aed">sqlglot AST — own catalog or federate?</text>

  <!-- DuckDB — single engine -->
  <rect x="60" y="355" width="470" height="110" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="295" y="380" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">DuckDB — single query engine</text>

  <!-- Internal extensions -->
  <rect x="80" y="393" width="100" height="30" rx="5" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="130" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">httpfs (S3)</text>

  <rect x="190" y="393" width="80" height="30" rx="5" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="230" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">iceberg</text>

  <rect x="280" y="393" width="110" height="30" rx="5" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="335" y="408" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Trino ext.</text>
  <text x="335" y="420" text-anchor="middle" font-size="8" fill="#3b82f6">ATTACH TYPE TRINO</text>

  <rect x="400" y="393" width="110" height="30" rx="5" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="455" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">local OLAP</text>

  <text x="295" y="455" text-anchor="middle" font-size="10" fill="#16a34a">+ parquet, json, postgres, mysql extensions</text>

  <!-- Iceberg / REST / Preflight row -->
  <rect x="80" y="490" width="140" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" filter="url(#sh)"/>
  <text x="150" y="515" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Iceberg Manager</text>
  <rect x="235" y="490" width="100" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="285" y="515" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">REST + Flight</text>
  <rect x="350" y="490" width="100" height="40" rx="8" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
  <text x="400" y="515" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Preflight</text>

  <!-- JWT -->
  <rect x="60" y="555" width="470" height="30" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="295" y="575" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">JWT Manager + Stream Ingest + Kafka Bridge</text>

  <!-- ═══ Right side ═══ -->

  <!-- Team S3 Bucket (own catalog — DuckDB direct) -->
  <rect x="620" y="290" width="310" height="90" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="775" y="320" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">Team S3 Bucket (own catalog)</text>
  <text x="775" y="340" text-anchor="middle" font-size="11" fill="#16a34a">DuckDB connects direct via httpfs + IRSA</text>
  <text x="775" y="358" text-anchor="middle" font-size="11" fill="#16a34a">Iceberg tables managed by the sidecar</text>

  <!-- Starburst cluster (federation for everything else) -->
  <rect x="620" y="80" width="550" height="170" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#sh)"/>
  <text x="895" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#1e40af">Starburst / Trino Cluster</text>
  <text x="895" y="128" text-anchor="middle" font-size="12" fill="#3b82f6">federated gateway for all other datasources</text>

  <rect x="645" y="145" width="110" height="40" rx="6" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="700" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Coordinator</text>

  <rect x="770" y="145" width="90" height="40" rx="6" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="815" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Workers</text>

  <rect x="875" y="145" width="130" height="40" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="940" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">All Team Catalogs</text>
  <text x="940" y="176" text-anchor="middle" font-size="9" fill="#3b82f6">S3, JDBC, HMS</text>

  <rect x="1020" y="145" width="130" height="40" rx="6" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="1085" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Other Teams</text>
  <text x="1085" y="176" text-anchor="middle" font-size="9" fill="#dc2626">governed access</text>

  <!-- Other teams data -->
  <rect x="620" y="425" width="310" height="60" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
  <text x="775" y="452" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Other Teams' Data + External Sources</text>
  <text x="775" y="470" text-anchor="middle" font-size="11" fill="#dc2626">only accessible through Starburst federation</text>

  <!-- Kafka -->
  <rect x="975" y="310" width="170" height="55" rx="10" fill="#fef9c3" stroke="#fcd34d" filter="url(#sh)"/>
  <text x="1060" y="337" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Kafka</text>
  <text x="1060" y="352" text-anchor="middle" font-size="10" fill="#92400e">streaming events</text>

  <!-- ═══ Arrows ═══ -->

  <!-- App → Router -->
  <line x1="175" y1="202" x2="175" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#agr)"/>
  <text x="195" y="235" font-size="10" fill="#94a3b8">localhost</text>

  <!-- Local files → DuckDB (shared volume) -->
  <path d="M175,202 L175,355" fill="none" stroke="#16a34a" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="100" y="325" font-size="9" fill="#16a34a">shared vol</text>

  <!-- Router → DuckDB -->
  <line x1="190" y1="320" x2="190" y2="355" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>

  <!-- DuckDB httpfs → Team S3 (GREEN — direct, own catalog, fast) -->
  <path d="M530,385 L620,335" fill="none" stroke="#16a34a" stroke-width="3.5" class="fr" marker-end="url(#ag)"/>
  <text x="568" y="348" font-size="11" font-weight="700" fill="#15803d">httpfs IRSA</text>
  <text x="568" y="362" font-size="10" fill="#16a34a">own catalog (direct)</text>

  <!-- DuckDB Trino ext → Starburst (BLUE — federation for other sources) -->
  <path d="M530,400 L620,170" fill="none" stroke="#2563eb" stroke-width="3.5" class="fr" marker-end="url(#ab)"/>
  <text x="555" y="270" font-size="11" font-weight="700" fill="#1e40af">Trino ext.</text>
  <text x="555" y="285" font-size="10" fill="#3b82f6">federation (other sources)</text>

  <!-- Results back from Starburst -->
  <path d="M645,195 L530,415" fill="none" stroke="#2563eb" stroke-width="2" class="fl" marker-end="url(#ab)"/>

  <!-- Starburst → Other teams (governed) -->
  <path d="M775,250 L775,425" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- ═══ Legend ═══ -->
  <rect x="25" y="700" width="1150" height="60" rx="8" fill="#f1f5f9"/>
  <line x1="55" y1="730" x2="115" y2="730" stroke="#16a34a" stroke-width="3.5" stroke-dasharray="8 4"/>
  <text x="125" y="734" font-size="11" fill="#15803d" font-weight="600">Own catalog: DuckDB direct to S3 via httpfs + IRSA (fast, no hop)</text>
  <line x1="520" y1="730" x2="580" y2="730" stroke="#2563eb" stroke-width="3.5"/>
  <text x="590" y="734" font-size="11" fill="#1e40af" font-weight="600">Other sources: Starburst federation via DuckDB Trino extension</text>
  <rect x="1010" y="723" width="14" height="14" rx="3" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1030" y="734" font-size="11" fill="#991b1b">governed only</text>
</svg>
