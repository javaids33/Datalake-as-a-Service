<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      @keyframes flowR { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
      @keyframes flowL { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 24; } }
      .fr { stroke-dasharray: 8 4; animation: flowR 0.7s linear infinite; }
      .fl { stroke-dasharray: 8 4; animation: flowL 0.7s linear infinite; }
    </style>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16a34a"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="agr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
  </defs>

  <rect width="1200" height="780" fill="#fafbfc" rx="12"/>
  <text x="600" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">dlsidecar Architecture</text>
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#64748b">DuckDB is the single engine. Starburst is an attached catalog via the Trino extension. No separate client.</text>

  <!-- ═══ EKS Pod ═══ -->
  <rect x="25" y="75" width="500" height="600" rx="12" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="45" y="97" font-size="13" font-weight="600" fill="#64748b">EKS Pod (team)</text>

  <!-- App container -->
  <rect x="55" y="112" width="200" height="55" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="155" y="137" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">App Container</text>
  <text x="155" y="155" text-anchor="middle" font-size="11" fill="#94a3b8">POST localhost:8765/query</text>

  <!-- dlsidecar boundary -->
  <rect x="40" y="185" width="475" height="470" rx="10" fill="#f0f9ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="60" y="207" font-size="12" font-weight="600" fill="#3b82f6">dlsidecar container</text>

  <!-- Query Router -->
  <rect x="80" y="225" width="200" height="60" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" filter="url(#sh)"/>
  <text x="180" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Query Router</text>
  <text x="180" y="270" text-anchor="middle" font-size="11" fill="#7c3aed">sqlglot AST analysis</text>

  <!-- DuckDB — THE single engine, with Trino extension inside -->
  <rect x="60" y="320" width="440" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="280" y="348" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">DuckDB — single query engine</text>

  <!-- Internal capabilities -->
  <rect x="80" y="360" width="120" height="35" rx="5" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="140" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Local OLAP</text>

  <rect x="210" y="360" width="120" height="35" rx="5" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="270" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">httpfs (S3)</text>

  <rect x="340" y="360" width="140" height="35" rx="5" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="410" y="377" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Trino extension</text>
  <text x="410" y="390" text-anchor="middle" font-size="9" fill="#3b82f6">ATTACH TYPE TRINO</text>

  <text x="280" y="425" text-anchor="middle" font-size="10" fill="#16a34a">+ iceberg, json, parquet, postgres, mysql extensions</text>

  <!-- Iceberg Manager -->
  <rect x="80" y="470" width="160" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="497" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Iceberg Manager</text>

  <!-- REST / Flight -->
  <rect x="260" y="470" width="110" height="45" rx="8" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="315" y="497" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">REST + Flight</text>

  <!-- Preflight -->
  <rect x="390" y="470" width="110" height="45" rx="8" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
  <text x="445" y="497" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Preflight</text>

  <!-- JWT -->
  <rect x="60" y="540" width="440" height="35" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="280" y="563" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">JWT Manager — reads K8s projected SA token</text>

  <!-- Stream Ingest -->
  <rect x="60" y="595" width="200" height="35" rx="8" fill="#fce7f3" stroke="#ec4899" filter="url(#sh)"/>
  <text x="160" y="617" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">Stream Ingest + Kafka Bridge</text>

  <!-- ═══ Right side: External services ═══ -->

  <!-- Starburst Enterprise -->
  <rect x="600" y="80" width="570" height="180" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#sh)"/>
  <text x="885" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#1e40af">Starburst / Trino Cluster</text>
  <text x="885" y="128" text-anchor="middle" font-size="12" fill="#3b82f6">shared distributed compute — DuckDB connects directly via Trino extension</text>

  <rect x="625" y="145" width="120" height="45" rx="6" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="685" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Coordinator</text>
  <text x="685" y="182" text-anchor="middle" font-size="9" fill="#3b82f6">plan + optimize</text>

  <rect x="760" y="145" width="100" height="45" rx="6" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="810" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Workers</text>
  <text x="810" y="182" text-anchor="middle" font-size="9" fill="#3b82f6">distributed</text>

  <rect x="875" y="145" width="120" height="45" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="935" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">All Catalogs</text>
  <text x="935" y="182" text-anchor="middle" font-size="9" fill="#3b82f6">S3, JDBC, HMS</text>

  <rect x="1010" y="145" width="140" height="45" rx="6" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="1080" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Other Teams</text>
  <text x="1080" y="182" text-anchor="middle" font-size="9" fill="#dc2626">governed access</text>

  <!-- Team S3 -->
  <rect x="630" y="310" width="280" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="770" y="337" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Team S3 Bucket</text>
  <text x="770" y="355" text-anchor="middle" font-size="11" fill="#16a34a">DuckDB direct via IRSA (fast) + Starburst catalog (governed)</text>

  <!-- Iceberg -->
  <rect x="630" y="395" width="280" height="55" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="770" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Iceberg Tables</text>
  <text x="770" y="438" text-anchor="middle" font-size="11" fill="#16a34a">compaction, snapshots, HMS reg.</text>

  <!-- Other teams data -->
  <rect x="630" y="480" width="280" height="55" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
  <text x="770" y="505" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Other Teams' Data</text>
  <text x="770" y="523" text-anchor="middle" font-size="11" fill="#dc2626">governed via Starburst only</text>

  <!-- Local files -->
  <rect x="960" y="310" width="170" height="60" rx="10" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
  <text x="1045" y="337" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Local Files</text>
  <text x="1045" y="355" text-anchor="middle" font-size="10" fill="#16a34a">CSV, Parquet, Arrow</text>

  <!-- Kafka -->
  <rect x="960" y="395" width="170" height="55" rx="10" fill="#fef9c3" stroke="#fcd34d" filter="url(#sh)"/>
  <text x="1045" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Kafka</text>
  <text x="1045" y="438" text-anchor="middle" font-size="10" fill="#92400e">streaming events</text>

  <!-- ═══ Arrows ═══ -->

  <!-- App → Router -->
  <line x1="155" y1="167" x2="155" y2="225" stroke="#64748b" stroke-width="1.5" marker-end="url(#agr)"/>
  <text x="175" y="200" font-size="10" fill="#94a3b8">localhost</text>

  <!-- Router → DuckDB -->
  <line x1="180" y1="285" x2="180" y2="320" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>

  <!-- DuckDB Trino ext → Starburst Enterprise (the main highway — DIRECT, no client) -->
  <path d="M500,375 L600,160" fill="none" stroke="#2563eb" stroke-width="4" class="fr" marker-end="url(#ab)"/>
  <text x="540" y="250" font-size="11" font-weight="700" fill="#1e40af">Trino extension</text>
  <text x="540" y="265" font-size="10" fill="#3b82f6">ATTACH TYPE TRINO</text>

  <!-- Results back from Starburst -->
  <path d="M625,185 L500,390" fill="none" stroke="#2563eb" stroke-width="2.5" class="fl" marker-end="url(#ab)"/>
  <text x="545" y="310" font-size="9" fill="#3b82f6">results</text>

  <!-- DuckDB httpfs → Team S3 (green, direct) -->
  <path d="M500,360 L630,340" fill="none" stroke="#16a34a" stroke-width="2.5" class="fr" marker-end="url(#ag)"/>
  <text x="560" y="340" font-size="10" font-weight="600" fill="#16a34a">httpfs IRSA</text>

  <!-- DuckDB → Iceberg -->
  <path d="M500,400 L630,420" fill="none" stroke="#16a34a" stroke-width="1.5" class="fr" marker-end="url(#ag)"/>

  <!-- DuckDB → Local files -->
  <path d="M500,365 L960,340" fill="none" stroke="#16a34a" stroke-width="1.5" class="fr" marker-end="url(#ag)"/>

  <!-- Starburst → Other teams (governed) -->
  <path d="M770,260 L770,480" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- ═══ Legend ═══ -->
  <rect x="25" y="700" width="1150" height="60" rx="8" fill="#f1f5f9"/>
  <line x1="55" y1="730" x2="115" y2="730" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="8 4"/>
  <text x="125" y="734" font-size="11" fill="#15803d">DuckDB local (files, own S3, lightweight)</text>
  <line x1="400" y1="730" x2="460" y2="730" stroke="#2563eb" stroke-width="4"/>
  <text x="470" y="734" font-size="11" fill="#1e40af">DuckDB Trino extension to Starburst (heavy compute, federation)</text>
  <rect x="850" y="723" width="14" height="14" rx="3" fill="#fee2e2" stroke="#dc2626"/>
  <text x="870" y="734" font-size="11" fill="#991b1b">governed (Starburst only)</text>
</svg>
