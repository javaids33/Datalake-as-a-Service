<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      @keyframes flowR { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
      @keyframes flowL { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 20; } }
      .fr { stroke-dasharray: 8 4; animation: flowR 0.6s linear infinite; }
      .fl { stroke-dasharray: 8 4; animation: flowL 0.6s linear infinite; }
    </style>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16a34a"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="agr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
  </defs>

  <rect width="1100" height="520" fill="#fafbfc" rx="10"/>
  <text x="550" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Data Flow — Own Catalog Direct vs Federation</text>

  <!-- ═══ EKS Pod ═══ -->
  <rect x="25" y="50" width="420" height="390" rx="12" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="45" y="72" font-size="12" font-weight="600" fill="#64748b">EKS Pod</text>

  <!-- App container with local files INSIDE -->
  <rect x="45" y="82" width="170" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="130" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">App Container</text>
  <rect x="58" y="118" width="65" height="22" rx="4" fill="#f0fdf4" stroke="#86efac"/>
  <text x="90" y="133" text-anchor="middle" font-size="8" font-weight="600" fill="#15803d">CSV files</text>
  <rect x="130" y="118" width="72" height="22" rx="4" fill="#f0fdf4" stroke="#86efac"/>
  <text x="166" y="133" text-anchor="middle" font-size="8" font-weight="600" fill="#15803d">Parquet files</text>

  <!-- dlsidecar -->
  <rect x="40" y="180" width="395" height="240" rx="10" fill="#f0f9ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="55" y="197" font-size="11" font-weight="600" fill="#3b82f6">dlsidecar</text>

  <!-- DuckDB -->
  <rect x="55" y="210" width="365" height="85" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="237" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">DuckDB (single engine)</text>
  <rect x="70" y="250" width="75" height="24" rx="4" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="107" y="266" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">httpfs</text>
  <rect x="155" y="250" width="65" height="24" rx="4" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="187" y="266" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">iceberg</text>
  <rect x="230" y="250" width="55" height="24" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="257" y="266" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af">trino</text>
  <rect x="295" y="250" width="55" height="24" rx="4" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="322" y="266" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">json</text>
  <rect x="360" y="250" width="50" height="24" rx="4" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="385" y="266" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">parquet</text>

  <!-- Router + sub -->
  <rect x="70" y="315" width="160" height="30" rx="6" fill="#ede9fe" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="150" y="335" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Query Router</text>
  <rect x="250" y="315" width="140" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" filter="url(#sh)"/>
  <text x="320" y="335" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">Iceberg Lifecycle</text>
  <rect x="70" y="360" width="160" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="150" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">REST :8765 / Flight :8766</text>
  <rect x="250" y="360" width="140" height="30" rx="6" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
  <text x="320" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Preflight Checker</text>

  <!-- ═══ Right: External resources ═══ -->

  <!-- Team S3 (OWN CATALOG — green, prominent) -->
  <rect x="510" y="200" width="250" height="90" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="635" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Team S3 Bucket</text>
  <text x="635" y="248" text-anchor="middle" font-size="11" fill="#15803d">OWN CATALOG</text>
  <text x="635" y="267" text-anchor="middle" font-size="10" fill="#16a34a">DuckDB direct via httpfs + IRSA</text>
  <text x="635" y="280" text-anchor="middle" font-size="10" fill="#16a34a">Iceberg tables managed by sidecar</text>

  <!-- DuckDB → own S3 (GREEN thick arrow) -->
  <path d="M420,245 L510,245" fill="none" stroke="#16a34a" stroke-width="4" class="fr" marker-end="url(#ag)"/>
  <text x="465" y="238" font-size="10" font-weight="700" fill="#15803d">direct</text>

  <!-- Starburst cluster (FEDERATION) -->
  <rect x="510" y="55" width="560" height="115" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#sh)"/>
  <text x="790" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Starburst / Trino — Federated Gateway</text>
  <text x="790" y="98" text-anchor="middle" font-size="11" fill="#3b82f6">routes to all other datasources the team does not own directly</text>
  <rect x="530" y="115" width="90" height="32" rx="5" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="575" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Coordinator</text>
  <rect x="630" y="115" width="80" height="32" rx="5" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="670" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Workers</text>
  <rect x="720" y="115" width="100" height="32" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="770" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">All Catalogs</text>
  <rect x="830" y="115" width="100" height="32" rx="5" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="880" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">Other Teams</text>
  <rect x="940" y="115" width="110" height="32" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="995" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">JDBC Sources</text>

  <!-- DuckDB → Starburst (BLUE arrow — federation) -->
  <path d="M420,230 L510,110" fill="none" stroke="#2563eb" stroke-width="3.5" class="fr" marker-end="url(#ab)"/>
  <text x="448" y="160" font-size="10" font-weight="700" fill="#1e40af">Trino ext.</text>
  <text x="448" y="173" font-size="9" fill="#3b82f6">federation</text>

  <!-- Results back -->
  <path d="M530,135 L420,250" fill="none" stroke="#2563eb" stroke-width="2" class="fl" marker-end="url(#ab)"/>

  <!-- Other sources (accessed through Starburst) -->
  <rect x="810" y="210" width="150" height="45" rx="8" fill="#fee2e2" stroke="#dc2626" filter="url(#sh)"/>
  <text x="885" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Other Teams</text>
  <text x="885" y="247" text-anchor="middle" font-size="9" fill="#dc2626">Starburst only</text>

  <rect x="810" y="270" width="150" height="45" rx="8" fill="#dbeafe" stroke="#93c5fd" filter="url(#sh)"/>
  <text x="885" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">PostgreSQL</text>
  <text x="885" y="307" text-anchor="middle" font-size="9" fill="#3b82f6">via Starburst JDBC</text>

  <rect x="810" y="330" width="150" height="45" rx="8" fill="#dbeafe" stroke="#93c5fd" filter="url(#sh)"/>
  <text x="885" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">MySQL, Mongo</text>
  <text x="885" y="367" text-anchor="middle" font-size="9" fill="#3b82f6">via Starburst JDBC</text>

  <!-- Kafka -->
  <rect x="510" y="330" width="200" height="50" rx="8" fill="#fef9c3" stroke="#fcd34d" filter="url(#sh)"/>
  <text x="610" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Kafka Events</text>
  <text x="610" y="370" text-anchor="middle" font-size="10" fill="#92400e">consumed by sidecar Kafka bridge</text>

  <!-- App → DuckDB (shared volume for local files) -->
  <path d="M130,162 L130,210" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ag)"/>
  <text x="145" y="190" font-size="8" fill="#16a34a">shared vol</text>

  <!-- ═══ Legend ═══ -->
  <rect x="25" y="455" width="1050" height="50" rx="8" fill="#f1f5f9"/>
  <line x1="55" y1="480" x2="115" y2="480" stroke="#16a34a" stroke-width="4" stroke-dasharray="8 4"/>
  <text x="125" y="484" font-size="11" fill="#15803d" font-weight="600">Own catalog: DuckDB httpfs direct to team S3 (fast, no federation hop)</text>
  <line x1="565" y1="480" x2="625" y2="480" stroke="#2563eb" stroke-width="3.5"/>
  <text x="635" y="484" font-size="11" fill="#1e40af" font-weight="600">Other sources: Starburst federation via DuckDB Trino extension</text>
</svg>
