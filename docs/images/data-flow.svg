<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      @keyframes flowR { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
      @keyframes flowL { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 20; } }
      .fr { stroke-dasharray: 8 4; animation: flowR 0.6s linear infinite; }
      .fl { stroke-dasharray: 8 4; animation: flowL 0.6s linear infinite; }
    </style>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16a34a"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
  </defs>

  <rect width="1100" height="500" fill="#fafbfc" rx="10"/>
  <text x="550" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">DuckDB as Single Engine — Two Modes of Operation</text>

  <!-- ═══ DuckDB pod ═══ -->
  <rect x="30" y="55" width="380" height="370" rx="12" fill="#f0f9ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="220" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#3b82f6">dlsidecar (DuckDB is the only engine)</text>

  <!-- DuckDB single box with extensions listed -->
  <rect x="50" y="95" width="340" height="130" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="220" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">DuckDB</text>
  <text x="220" y="138" text-anchor="middle" font-size="11" fill="#16a34a">single query engine in the pod</text>

  <!-- Extension badges -->
  <rect x="65" y="150" width="65" height="22" rx="4" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="97" y="165" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">httpfs</text>
  <rect x="138" y="150" width="60" height="22" rx="4" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="168" y="165" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">iceberg</text>
  <rect x="206" y="150" width="55" height="22" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="233" y="165" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af">trino</text>
  <rect x="269" y="150" width="55" height="22" rx="4" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="296" y="165" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">postgres</text>
  <rect x="332" y="150" width="48" height="22" rx="4" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="356" y="165" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">mysql</text>

  <text x="220" y="195" text-anchor="middle" font-size="10" fill="#16a34a">local OLAP | data prep | result caching | format conversion</text>
  <text x="220" y="210" text-anchor="middle" font-size="10" fill="#16a34a">ATTACH starburst (TYPE TRINO) | ATTACH pg (TYPE POSTGRES)</text>

  <!-- Query Router -->
  <rect x="80" y="250" width="240" height="35" rx="6" fill="#ede9fe" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="200" y="273" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Query Router (sqlglot AST)</text>

  <!-- Sub-components -->
  <rect x="60" y="305" width="140" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" filter="url(#sh)"/>
  <text x="130" y="327" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Iceberg Lifecycle</text>
  <rect x="220" y="305" width="120" height="35" rx="6" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="280" y="327" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">REST :8765</text>

  <rect x="60" y="360" width="300" height="35" rx="6" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
  <text x="210" y="382" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Preflight Checker (17 K8s validations)</text>

  <!-- ═══ Right: External targets ═══ -->

  <!-- Starburst cluster -->
  <rect x="480" y="55" width="590" height="140" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#sh)"/>
  <text x="775" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Starburst / Trino Distributed Cluster</text>
  <text x="775" y="100" text-anchor="middle" font-size="11" fill="#3b82f6">DuckDB ATTACHes directly — no separate client, no Python trino library</text>
  <rect x="500" y="115" width="100" height="35" rx="5" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="550" y="137" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Coordinator</text>
  <rect x="615" y="115" width="90" height="35" rx="5" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="660" y="137" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Workers</text>
  <rect x="720" y="115" width="90" height="35" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="765" y="137" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Catalogs</text>
  <rect x="825" y="115" width="110" height="35" rx="5" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="880" y="137" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Other Teams</text>
  <rect x="950" y="115" width="100" height="35" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="1000" y="137" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">JDBC</text>

  <!-- Data targets -->
  <rect x="480" y="230" width="200" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="580" y="255" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Team S3 Bucket</text>
  <text x="580" y="270" text-anchor="middle" font-size="10" fill="#16a34a">direct IRSA + Starburst catalog</text>

  <rect x="700" y="230" width="180" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" filter="url(#sh)"/>
  <text x="790" y="255" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Iceberg Tables</text>

  <rect x="900" y="230" width="160" height="50" rx="8" fill="#fee2e2" stroke="#dc2626" filter="url(#sh)"/>
  <text x="980" y="255" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Other Teams</text>
  <text x="980" y="270" text-anchor="middle" font-size="10" fill="#dc2626">Starburst only</text>

  <rect x="480" y="310" width="140" height="45" rx="8" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
  <text x="550" y="337" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Local Files</text>

  <rect x="640" y="310" width="140" height="45" rx="8" fill="#fef9c3" stroke="#fcd34d" filter="url(#sh)"/>
  <text x="710" y="337" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Kafka</text>

  <rect x="800" y="310" width="130" height="45" rx="8" fill="#dbeafe" stroke="#93c5fd" filter="url(#sh)"/>
  <text x="865" y="337" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">PostgreSQL</text>

  <rect x="950" y="310" width="110" height="45" rx="8" fill="#dbeafe" stroke="#93c5fd" filter="url(#sh)"/>
  <text x="1005" y="337" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">MySQL</text>

  <!-- ═══ Arrows ═══ -->
  <!-- DuckDB Trino → Starburst (main highway) -->
  <path d="M390,140 L480,120" fill="none" stroke="#2563eb" stroke-width="4" class="fr" marker-end="url(#ab)"/>
  <text x="430" y="118" font-size="10" font-weight="700" fill="#1e40af">ATTACH</text>
  <path d="M480,155 L390,165" fill="none" stroke="#2563eb" stroke-width="2.5" class="fl" marker-end="url(#ab)"/>

  <!-- DuckDB → S3 (direct) -->
  <path d="M390,155 L480,250" fill="none" stroke="#16a34a" stroke-width="2" class="fr" marker-end="url(#ag)"/>
  <text x="420" y="210" font-size="9" fill="#16a34a">httpfs</text>

  <!-- DuckDB → Local files -->
  <path d="M390,170 L480,330" fill="none" stroke="#16a34a" stroke-width="1.5" class="fr" marker-end="url(#ag)"/>

  <!-- DuckDB → Postgres/MySQL (native extensions) -->
  <path d="M390,185 L800,330" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fr" marker-end="url(#ab)"/>
  <path d="M390,190 L950,330" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fr" marker-end="url(#ab)"/>

  <!-- ═══ Legend ═══ -->
  <rect x="30" y="420" width="1040" height="65" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="550" y="445" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">All queries execute through DuckDB. Federation happens via attached catalogs.</text>
  <text x="550" y="465" text-anchor="middle" font-size="11" fill="#334155">Local work (files, small scans): DuckDB handles directly. Heavy compute (GROUP BY, JOINs on 500GB): DuckDB pushes to Starburst via Trino extension.</text>
  <text x="550" y="480" text-anchor="middle" font-size="11" fill="#1e40af">Additional sources (Postgres, MySQL): DuckDB attaches them natively. One engine, many catalogs.</text>
</svg>
