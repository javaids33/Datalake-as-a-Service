<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      @keyframes flowR { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
      @keyframes flowL { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 20; } }
      .fr { stroke-dasharray: 8 4; animation: flowR 0.6s linear infinite; }
      .fl { stroke-dasharray: 8 4; animation: flowL 0.6s linear infinite; }
    </style>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16a34a"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
  </defs>

  <rect width="1100" height="550" fill="#fafbfc" rx="10"/>
  <text x="550" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Federation Architecture — How Trino Provides Distributed Compute</text>

  <!-- ═══ Left: dlsidecar pod ═══ -->
  <rect x="30" y="55" width="380" height="430" rx="12" fill="#f0f9ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="220" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#3b82f6">dlsidecar (in-pod, lightweight)</text>

  <!-- DuckDB -->
  <rect x="50" y="100" width="160" height="120" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="130" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">DuckDB</text>
  <text x="130" y="148" text-anchor="middle" font-size="10" fill="#16a34a">2-4GB memory</text>
  <text x="130" y="163" text-anchor="middle" font-size="10" fill="#16a34a">Local file I/O</text>
  <text x="130" y="178" text-anchor="middle" font-size="10" fill="#16a34a">Data prep + cache</text>
  <text x="130" y="193" text-anchor="middle" font-size="10" fill="#16a34a">Small OLAP queries</text>

  <!-- Starburst client -->
  <rect x="230" y="100" width="160" height="120" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
  <text x="310" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Trino Client</text>
  <text x="310" y="148" text-anchor="middle" font-size="10" fill="#2563eb">JWT auth pool</text>
  <text x="310" y="163" text-anchor="middle" font-size="10" fill="#2563eb">Query offload</text>
  <text x="310" y="178" text-anchor="middle" font-size="10" fill="#2563eb">Result relay</text>
  <text x="310" y="193" text-anchor="middle" font-size="10" fill="#2563eb">Connection pool</text>

  <!-- DuckDB ↔ Trino Client arrows -->
  <path d="M210,140 L230,140" fill="none" stroke="#7c3aed" stroke-width="3" class="fr" marker-end="url(#ap)"/>
  <path d="M230,180 L210,180" fill="none" stroke="#7c3aed" stroke-width="2.5" class="fl" marker-end="url(#ap)"/>
  <text x="218" y="133" text-anchor="middle" font-size="8" font-weight="600" fill="#7c3aed">query</text>
  <text x="218" y="195" text-anchor="middle" font-size="8" font-weight="600" fill="#7c3aed">results</text>

  <!-- Query Router -->
  <rect x="80" y="250" width="240" height="40" rx="6" fill="#ede9fe" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="200" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Query Router (sqlglot AST)</text>

  <!-- Iceberg + HMS -->
  <rect x="60" y="310" width="140" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" filter="url(#sh)"/>
  <text x="130" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Iceberg Lifecycle</text>
  <rect x="220" y="310" width="140" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="290" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">HMS Register</text>

  <!-- Preflight -->
  <rect x="60" y="370" width="300" height="35" rx="6" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
  <text x="210" y="393" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Preflight Checker (17 K8s validations)</text>

  <!-- REST/Flight -->
  <rect x="60" y="420" width="140" height="35" rx="6" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="130" y="443" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">REST :8765</text>
  <rect x="220" y="420" width="140" height="35" rx="6" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="290" y="443" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Flight :8766</text>

  <!-- ═══ Center: Connection (the thick highway) ═══ -->
  <path d="M390,160 L480,160" fill="none" stroke="#2563eb" stroke-width="5" class="fr" marker-end="url(#ab)"/>
  <path d="M480,180 L390,180" fill="none" stroke="#2563eb" stroke-width="3.5" class="fl" marker-end="url(#ab)"/>
  <text x="435" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">JWT/TLS</text>
  <text x="435" y="198" text-anchor="middle" font-size="9" fill="#3b82f6">results</text>

  <!-- ═══ Right: Starburst/Trino Cluster ═══ -->
  <rect x="480" y="55" width="590" height="250" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#sh)"/>
  <text x="775" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Starburst / Trino Distributed Cluster</text>
  <text x="775" y="96" text-anchor="middle" font-size="11" fill="#3b82f6">This is where the heavy lifting happens — distributed compute across 10+ workers</text>

  <!-- Coordinator -->
  <rect x="510" y="115" width="180" height="60" rx="8" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Coordinator</text>
  <text x="600" y="158" text-anchor="middle" font-size="10" fill="#3b82f6">query plan + optimize</text>

  <!-- Workers (fan out) -->
  <rect x="730" y="105" width="100" height="40" rx="6" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="780" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Worker 1</text>
  <rect x="840" y="105" width="100" height="40" rx="6" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="890" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Worker 2</text>
  <rect x="950" y="105" width="100" height="40" rx="6" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="1000" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Worker N</text>

  <line x1="690" y1="135" x2="730" y2="125" stroke="#60a5fa" stroke-width="1.5" class="fr"/>
  <line x1="690" y1="145" x2="840" y2="125" stroke="#60a5fa" stroke-width="1.5" class="fr"/>
  <line x1="690" y1="150" x2="950" y2="125" stroke="#60a5fa" stroke-width="1.5" class="fr"/>

  <!-- Catalogs / connectors -->
  <rect x="510" y="195" width="120" height="40" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="570" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">HMS / Glue</text>
  <text x="570" y="228" text-anchor="middle" font-size="9" fill="#3b82f6">catalog</text>

  <rect x="645" y="195" width="120" height="40" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="705" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">S3 Connector</text>
  <text x="705" y="228" text-anchor="middle" font-size="9" fill="#3b82f6">all teams</text>

  <rect x="780" y="195" width="120" height="40" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="840" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">JDBC</text>
  <text x="840" y="228" text-anchor="middle" font-size="9" fill="#3b82f6">PG, MySQL</text>

  <rect x="915" y="195" width="140" height="40" rx="5" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="985" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Other Teams</text>
  <text x="985" y="228" text-anchor="middle" font-size="9" fill="#dc2626">governed access</text>

  <!-- ═══ Bottom: Data sources ═══ -->
  <rect x="480" y="340" width="140" height="55" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="550" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Team S3</text>
  <text x="550" y="382" text-anchor="middle" font-size="10" fill="#16a34a">direct via IRSA</text>

  <rect x="640" y="340" width="140" height="55" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="710" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Iceberg</text>
  <text x="710" y="382" text-anchor="middle" font-size="10" fill="#16a34a">compacted tables</text>

  <rect x="800" y="340" width="140" height="55" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
  <text x="870" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Other Teams</text>
  <text x="870" y="382" text-anchor="middle" font-size="10" fill="#dc2626">Starburst only</text>

  <rect x="960" y="340" width="100" height="55" rx="8" fill="#fef9c3" stroke="#fcd34d" filter="url(#sh)"/>
  <text x="1010" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Kafka</text>
  <text x="1010" y="382" text-anchor="middle" font-size="10" fill="#92400e">events</text>

  <!-- DuckDB direct to Team S3 -->
  <path d="M210,220 L480,360" fill="none" stroke="#16a34a" stroke-width="2.5" class="fr" marker-end="url(#ag)"/>
  <text x="340" y="285" font-size="10" font-weight="600" fill="#15803d">httpfs IRSA (direct, fast)</text>

  <!-- DuckDB direct to Iceberg -->
  <path d="M210,215 L640,367" fill="none" stroke="#16a34a" stroke-width="1.5" class="fr" marker-end="url(#ag)"/>

  <!-- Starburst → Other teams (governed) -->
  <path d="M870,305 L870,340" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4 3" class="fr"/>

  <!-- ═══ Bottom legend ═══ -->
  <rect x="30" y="420" width="1040" height="110" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="550" y="445" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Why This Architecture?</text>

  <text x="80" y="470" font-size="12" fill="#15803d" font-weight="600">DuckDB (lightweight)</text>
  <text x="80" y="488" font-size="11" fill="#334155">Reads local CSV/Parquet in microseconds. Converts formats. Caches Starburst results. 2-4GB memory.</text>
  <text x="80" y="504" font-size="11" fill="#334155">Perfect for: data prep, file I/O, small scans, result caching, schema transforms.</text>

  <text x="600" y="470" font-size="12" fill="#1e40af" font-weight="600">Starburst/Trino (distributed compute)</text>
  <text x="600" y="488" font-size="11" fill="#334155">Scans 500GB across 10 workers in parallel. Federates across all team namespaces. Enforces governance.</text>
  <text x="600" y="504" font-size="11" fill="#334155">Perfect for: heavy GROUP BY, window functions, cross-team JOINs, large table scans.</text>
</svg>
